name: deitel-openai
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.14
  - jupyterlab>=4.0
  - ipykernel
  - numpy           # 01-05 code-generation performance example
  - pandas          # data analysis tasks generated by Codex/agents
  - scipy           # scientific computing tasks
  - scikit-learn    # machine learning examples generated by Codex/agents
  - statsmodels     # statistical modeling tasks
  - matplotlib      # plotting and visualization
  - seaborn         # statistical visualization
  - plotly          # interactive visualization
  - openpyxl        # Excel file support for pandas
  - pillow          # image processing support
  - wordcloud       # word-cloud coding demos
  - requests        # HTTP examples generated by Codex/agents
  - beautifulsoup4  # HTML parsing / scraping examples
  - lxml            # fast XML/HTML parsing backend
  - spacy           # NLP examples generated by Codex/agents
  - nltk            # NLP/text analysis examples
  - graphviz        # Graphviz executable for Agents SDK graph visualizations
  - python-graphviz # Python bindings for Graphviz
  - pytest          # 03-01 Codex app demos
  - sounddevice     # microphone recording for voice agent demo
  - pip
  - pip:
    - "openai>=1.0"           # core OpenAI Python client
    - "openai-agents[litellm]" # OpenAI Agents SDK plus LiteLLM support (02-* notebooks)
    - "mcp"                   # MCP server support (02-05-05, 02-05-06)
    - "yfinance"              # 02-05-01 financial research agent
    - "playsound3"            # audio playback (01-02-speech)
    - "playwright"            # browser automation (02-05-07)
    - "pydantic"              # structured outputs and MCP tool parameter metadata
